services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: investidor10_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db
    networks:
      - investidor10_network

  webserver:
    image: nginx:alpine
    container_name: investidor10_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - investidor10_network

  db:
    image: mysql:8.0
    container_name: investidor10_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: investidor10
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - investidor10_network

volumes:
  db_data:

networks:
  investidor10_network:
    driver: bridge